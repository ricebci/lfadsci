hydra:
  run:
    dir: ${outputDir}
  sweep:
    dir: ${outputDir}
    subdir: ${hydra.job.override_dirname}
  job:
    config:
      override_dirname:
        exclude_keys:
          - outputDir
          - mode
          - gpuNumber

defaults:
  - model: lfads_bias_tv_input
  - _self_

gpuNumber: "0"

seed: 98
data_seed: 98

batch_size: 512
train_frac: 0.6
val_frac: 0.2
test_frac: 0.2

lr_init: 1e-4
lr_stop: 1e-6
n_steps: 40000
decay_factor: 0.95
patience_till_lr_decay: 10
save_freq: 500
mode: train

outputDir: ${hydra:runtime.cwd}/models/t19_finger
outputPlotDir: ${hydra:runtime.cwd}/../outputs/lfads/t19_finger

epoch_time_window: [-400, 400]
channels: 55b
channel_map:
  55b: [64, 192]
  M1: [[0, 64], [192, 256]]

dataset:
  name: t19_12302025_fingercomplex
  data_dir: /home/user/users/yusui/data/T19/preprocessed
  data_file: merged_discard1sttrial_lfpNtx_4oneTouchPlot_smooth5_rmVNbyFT.mat
  cue_key: trialCues
  go_epoch_key: goTrialEpochs
  go_epoch_column: 0
  tx_key: binnedTX
  task_name: t19_12302025_fingercomplex


results:
  n_samples: 100

model:
  factors: 40
  ic_dim: 5
  bias_dim: 5
  n_hidden_encode_ic: 128
  n_hidden_encode_bias: 128
  n_hidden_encode_tv_input: 128
  n_hidden_decode: 200
  n_dynamics: 1
  dropout_rate: 0.0
  lam_predict: 1.0
  lam_kl_ic: 1.0
  lam_kl_bias: 1.0
  lam_kl_tv_inp: 1.0
  lam_l2: 0
  tv_input_dim: 1
  tv_input_smoothness_alpha: 0.0
  noise_stddev: 0.0
  generator_type: gru
  use_bias: true
  use_tv_input: false
  kl_warmup_start: 500
  kl_warmup_end: 1000